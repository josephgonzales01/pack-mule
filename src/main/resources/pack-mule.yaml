# ─────────────────────────────────────────────
# Pack Mule Configuration
# ─────────────────────────────────────────────

defaults:
  groupId: "com.mycompany"
  runtime: "4.6.0"
  jdk: "17"

# These lists populate TUI options
runtime:
  - version: "4.11.0"
  - version: "4.9.0"
  - version: "4.6.0"

jdk:
  - version: 8
  - version: 11
  - version: 17

# ─────────────────────────────────────────────
# Triggers (Radio buttons in TUI)
# ID corresponds to directory: templates/triggers/{id}/
# ─────────────────────────────────────────────
triggers:
  - id: HTTP_LISTENER
    label: "HTTP Listener (RESTful API)"
    # implicitly includes templates/triggers/HTTP_LISTENER
    # requires 'apikit' dependency 
    dependencies: ["apikit", "http-connector"]
  
  - id: ANYPOINT_MQ
    label: "Anypoint MQ Subscriber"
    dependencies: ["anypoint-mq"]

  - id: SCHEDULER
    label: "Timer / Scheduled Job"
    dependencies: []


# ─────────────────────────────────────────────
# Capabilities (Checkboxes in TUI)
# User selecting this copies from templates/capabilities/{id}/
# ─────────────────────────────────────────────
capabilities:
  - id: DATABASE
    label: "Database (JDBC)"
    category: "Connector"
    dependencies: ["db-connector"] # Pulls from dependency catalog below
    
  - id: SALESFORCE
    label: "Salesforce"
    category: "Connector"
    dependencies: ["salesforce-connector"]


# ─────────────────────────────────────────────
# Dependency Catalog (For POM.xml generation)
# ─────────────────────────────────────────────
dependencies:
  apikit:
    groupId: "org.mule.modules"
    artifactId: "mule-apikit-module"
    version: "1.9.0"
    classifier: "mule-plugin"
    
  http-connector:
    groupId: "org.mule.connectors"
    artifactId: "mule-http-connector"
    version: "1.9.2"
    classifier: "mule-plugin"

  db-connector:
    groupId: "org.mule.connectors"
    artifactId: "mule-db-connector"
    version: "1.14.7"
    classifier: "mule-plugin"
    
  salesforce-connector:
    groupId: "com.mulesoft.connectors"
    artifactId: "mule-salesforce-connector"
    version: "10.18.0"
    classifier: "mule-plugin"
    
  anypoint-mq:
    groupId: "com.mulesoft.connectors"
    artifactId: "anypoint-mq-connector"
    version: "4.0.7"
    classifier: "mule-plugin"

# hooks remain the same
hooks:
  postGenerate:
    - type: shell
      command: "git init {outputDir}/{projectName}"
      enabled: false
